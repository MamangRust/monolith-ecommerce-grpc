syntax = "proto3";

package pb;

import "google/protobuf/empty.proto";
import "order_item/order_item_common.proto";

option go_package = "github.com/MamangRust/monolith-ecommerce-shared/pb";

message CreateOrderItemRecordRequest {
    int32 order_id = 1;
    int32 product_id = 2;
    int32 quantity = 3;
    int32 price = 4;
}

message UpdateOrderItemRecordRequest {
    int32 order_item_id = 1;
    int32 quantity = 2;
    int32 price = 3;
}

message CalculateTotalPriceRequest {
    int32 order_id = 1;
}

message CalculateTotalPriceResponse {
    string status = 1;
    string message = 2;
    int32 total_price = 3;
}

service OrderItemCommandService {
    rpc CreateOrderItem(CreateOrderItemRecordRequest) returns (ApiResponseOrderItem);
    rpc UpdateOrderItem(UpdateOrderItemRecordRequest) returns (ApiResponseOrderItem);
    rpc TrashOrderItem(FindByIdOrderItemRequest) returns (ApiResponseOrderItem);
    rpc RestoreOrderItem(FindByIdOrderItemRequest) returns (ApiResponseOrderItem);
    rpc DeleteOrderItemPermanent(FindByIdOrderItemRequest) returns (ApiResponseOrderItemDelete);
    rpc RestoreAllOrdersItem(google.protobuf.Empty) returns (ApiResponseOrderItemAll);
    rpc DeleteAllPermanentOrdersItem(google.protobuf.Empty) returns (ApiResponseOrderItemAll);
    rpc CalculateTotalPrice(CalculateTotalPriceRequest) returns (CalculateTotalPriceResponse);
}
