syntax = "proto3";

package pb;

import "common/api.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/MamangRust/monolith-ecommerce-shared/pb";

message FindByIdShippingRequest {
    int32 id = 1;
}

message ShippingResponse {
    int32 id = 1;
    int32 order_id = 2;
    string alamat = 3;
    string provinsi = 4;
    string negara = 5;
    string kota = 6;
    string shippingMethod = 7;
    int32 shippingCost = 8;
    string created_at = 9;
    string updated_at = 10;
}

message ShippingResponseDeleteAt {
    int32 id = 1;
    int32 order_id = 2;
    string alamat = 3;
    string provinsi = 4;
    string negara = 5;
    string kota = 6;
    string shippingMethod = 7;
    int32 shippingCost = 8;
    string created_at = 9;
    string updated_at = 10;
    google.protobuf.StringValue deleted_at = 11;
}

message ApiResponseShipping {
    string status = 1;
    string message = 2;
    ShippingResponse data = 3;
}

message ApiResponseShippingDeleteAt {
    string status = 1;
    string message = 2;
    ShippingResponseDeleteAt data = 3;
}

message ApiResponsesShipping {
    string status = 1;
    string message = 2;
    repeated ShippingResponse data = 3;
}

message ApiResponseShippingDelete {
    string status = 1;
    string message = 2;
}

message ApiResponseShippingAll {
    string status = 1;
    string message = 2;
}

message ApiResponsePaginationShipping {
    string status = 1;
    string message = 2;
    repeated ShippingResponse data = 3;
    PaginationMeta pagination = 4;
}

message ApiResponsePaginationShippingDeleteAt {
    string status = 1;
    string message = 2;
    repeated ShippingResponseDeleteAt data = 3;
    PaginationMeta pagination = 4;
}
