      - application/json
      description: Restore a trashed banner record by its ID
      parameters:
      - description: Banner ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully restored banner
          schema:
            $ref: '#/definitions/response.ApiResponseBannerDeleteAt'
        "400":
          description: Invalid banner ID
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "500":
          description: Failed to restore banner
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      security:
      - Bearer: []
      summary: Restore a trashed banner
      tags:
      - Banner Command
  /api/banner-command/restore/all:
    post:
      consumes:
      - application/json
      description: Restore all trashed banner records
      produces:
      - application/json
      responses:
        "200":
          description: Successfully restored all banners
          schema:
            $ref: '#/definitions/response.ApiResponseBannerAll'
        "500":
          description: Failed to restore banners
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      security:
      - Bearer: []
      summary: Restore all trashed banners
      tags:
      - Banner Command
  /api/banner-command/trashed/{id}:
    post:
      consumes:
      - application/json
      description: Move a banner record to trash by its ID
      parameters:
      - description: Banner ID
        in: path
        name: id
        required: true
