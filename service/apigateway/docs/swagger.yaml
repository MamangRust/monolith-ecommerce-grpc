host: localhost:5000
info:
  contact: {}
  description: gRPC based Payment Gateway service
  title: PaymentGateway gRPC
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully logged in
          schema:
            $ref: '#/definitions/response.ApiResponseLogin'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      summary: Login user
      tags:
      - Auth
  /api/auth/me:
    get:
      consumes:
      - application/json
      description: Retrieve current authenticated user details
      produces:
      - application/json
      responses:
        "200":
          description: User info
          schema:
            $ref: '#/definitions/response.ApiResponseGetMe'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      security:
      - Bearer: []
      summary: Get current user info
      tags:
      - Auth
  /api/auth/refresh-token:
    post:
      consumes:
      - application/json
      description: refresh token
      parameters:
      - description: Refresh token details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully refreshed token
          schema:
            $ref: '#/definitions/response.ApiResponseRefreshToken'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      summary: Refresh token
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully registered
          schema:
            $ref: '#/definitions/response.ApiResponseRegister'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /api/banner-command/create:
    post:
      consumes:
      - application/json
      description: Create a new banner with the provided details
      parameters:
      - description: Create banner request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.CreateBannerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully created banner
          schema:
            $ref: '#/definitions/response.ApiResponseBanner'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "500":
          description: Failed to create banner
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      security:
      - Bearer: []
      summary: Create a new banner
      tags:
      - Banner Command
  /api/banner-command/permanent/{id}:
    delete:
      consumes:
      - application/json
      description: Permanently delete a banner record by its ID
      parameters:
      - description: Banner ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully deleted banner record permanently
          schema:
            $ref: '#/definitions/response.ApiResponseBannerDelete'
        "400":
          description: Invalid banner ID
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "500":
          description: Failed to delete banner permanently
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      security:
      - Bearer: []
      summary: Permanently delete a banner
      tags:
      - Banner Command
  /api/banner-command/permanent/all:
    post:
      consumes:
      - application/json
      description: Permanently delete all trashed banner records
      produces:
      - application/json
      responses:
        "200":
          description: Successfully deleted all banners permanently
          schema:
            $ref: '#/definitions/response.ApiResponseBannerAll'
        "500":
          description: Failed to delete banners permanently
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
      security:
      - Bearer: []
      summary: Permanently delete all trashed banners
      tags:
      - Banner Command
  /api/banner-command/restore/{id}:
